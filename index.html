/* Toast */
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#27ae60; color:#fff;
  padding:10px 24px; border-radius:30px; font-size:14px; letter-spacing:1px; z-index:9999;
  box-shadow:0 4px 20px rgba(39,174,96,0.4); animation:fadeout 2.5s forwards; }
@keyframes fadeout { 0%,70%{opacity:1} 100%{opacity:0} }

/* Header */
.header { background:linear-gradient(135deg,#1a2744,#2c3e6b); border-bottom:3px solid #f1c40f; padding:20px 16px; }
.header-inner { display:flex; align-items:center; gap:14px; }
.header-icon { font-size:36px; }
.title { font-size:20px; font-family:'Archivo Black',sans-serif; letter-spacing:3px;
  background:linear-gradient(90deg,#f1c40f,#e67e22); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.subtitle { font-size:11px; letter-spacing:4px; color:#7f8c9b; }

/* Nav */

.nav button { flex:1; padding:12px 6px; border:none; background:transparent; color:#5a6a8a;
  font-size:12px; font-family:'Oswald',sans-serif; letter-spacing:1px; text-transform:uppercase;
  cursor:pointer; border-bottom:2px solid transparent; min-width:60px; }
.nav button.active { color:#f1c40f; border-bottom-color:#f1c40f; }

.section { padding:16px 12px; }
.section-title { font-size:20px; font-family:'Archivo Black',sans-serif; letter-spacing:2px;
  margin-bottom:16px; border-left:4px solid #f1c40f; padding-left:12px; }

/* Add player */
.add-row { display:flex; gap:8px; margin-bottom:16px; }
.add-row input { flex:1; padding:12px 14px; border-radius:10px; border:1px solid #2a3a5c;
  background:#0e1628; color:#fff; font-size:15px; font-family:'Oswald',sans-serif; outline:none; }
.add-btn { padding:10px 18px; border-radius:10px; border:none;
  background:linear-gradient(135deg,#f1c40f,#e67e22); color:#0a0f1a; font-weight:800;
  font-size:13px; font-family:'Oswald',sans-serif; letter-spacing:1px; cursor:pointer; white-space:nowrap; }

.empty { text-align:center; color:#5a6a8a; font-size:14px; padding:30px; }

/* Player cards */
.player-card { display:flex; align-items:center; gap:12px; padding:12px 14px;
  background:linear-gradient(135deg,#141f36,#1a2a4a); border-radius:14px;
  border:1px solid #1e2d4a; margin-bottom:8px; }
.player-avatar { width:40px; height:40px; border-radius:50%;

.player-name { flex:1; font-size:16px; letter-spacing:1px; cursor:pointer; }
.play-btn { padding:6px 12px; border-radius:8px; border:none; background:#27ae60;

/* Match card */

/* Save button */

  background:linear-gradient(135deg,#27ae60,#2ecc71); color:#fff; font-size:16px;
  font-weight:800; font-family:'Oswald',sans-serif; letter-spacing:2px; cursor:pointer;
  box-shadow:0 4px 20px rgba(39,174,96,0.3); margin-top:4px; }

.admin-note { color:#7f8c9b; font-size:13px; margin-bottom:12px; margin-top:-8px; }

/* Standings */
.standings-header { display:flex; padding:10px 12px; background:#1a2744;
  border-radius:10px 10px 0 0; border-bottom:2px solid #f1c40f; }
.standings-row { display:flex; align-items:center; padding:12px;
  border-bottom:1px solid rgba(30,45,74,0.13); background:linear-gradient(135deg,#111b30,#162040); }
.standings-row.first { background:rgba(241,196,15,0.12); border-left:3px solid #f1c40f; }
.s-col { flex:1; text-align:center; font-size:14px; }
.s-col.wide { flex:2; text-align:left; }
.s-col.narrow { flex:0.5; }
.s-col.pts { font-weight:800; color:#f1c40f; font-size:18px; }
.legend { display:flex; flex-wrap:wrap; gap:14px; justify-content:center;
  font-size:12px; color:#5a6a8a; margin-top:14px; }

/* Rules */
.rule-card { background:linear-gradient(145deg,#111b30,#162040); border-radius:16px;
  padding:16px; border:1px solid #1e2d4a; }
.rule-row { display:flex; gap:14px; align-items:flex-start; margin-bottom:18px; }
.rule-row:last-child { margin-bottom:0; }
.rule-badge { padding:8px 14px; border-radius:10px; font-weight:900; font-size:18px;
  font-family:'Archivo Black',sans-serif; color:#fff; min-width:50px; text-align:center; flex-shrink:0; }
.rule-title { font-size:15px; font-weight:700; letter-spacing:1px; margin:0; }
.rule-desc { font-size:13px; color:#7f8c9b; line-height:1.4; margin:4px 0 0; }
.rule-note { margin-top:16px; padding:16px; border-radius:12px; background:#0e1628;
  border:1px solid #1e2d4a; font-size:13px; color:#7f8c9b; line-height:1.6; }
.rule-note p { margin-bottom:8px; }
.rule-note p:last-child { margin-bottom:0; }

.hidden { display:none; }

<script>
// ─── DATA ───
const MATCHES_BY_DATE = {
  "11 Jun":[{id:"A1",g:"A",h:"México",a:"Sudáfrica"},{id:"A2",g:"A",h:"Corea del Sur",a:"Rep. Checa"}],

  "15 Jun":[{id:"G1",g:"G",h:"Bélgica",a:"Egipto"},{id:"G2",g:"G",h:"Irán",a:"Nueva Zelanda"},{id:"H1",g:"H",h:"España",a:"Cabo Verde"},{id:"H2",g:"H",h:"Arabia Saudita",a:"Uruguay"}],
  "16 Jun":[{id:"I1",g:"I",h:"Francia",a:"Senegal"},{id:"I2",g:"I",h:"Noruega",a:"Irak"},{id:"J1",g:"J",h:"Argentina",a:"Argelia"},{id:"J2",g:"J",h:"Austria",a:"Jordania"}],
  "17 Jun":[{id:"K1",g:"K",h:"Portugal",a:"RD del Congo"},{id:"K2",g:"K",h:"Uzbekistán",a:"Colombia"},{id:"L1",g:"L",h:"Inglaterra",a:"Croacia"},{id:"L2",g:"L",h:"Ghana",a:"Panamá"}],
  "18 Jun":[{id:"A3",g:"A",h:"Rep. Checa",a:"Sudáfrica"},{id:"A4",g:"A",h:"México",a:"Corea del Sur"}],
  "19 Jun":[{id:"D3",g:"D",h:"Turquía",a:"Paraguay"},{id:"D4",g:"D",h:"EE.UU.",a:"Australia"},{id:"B3",g:"B",h:"Bosnia y Herz.",a:"Catar"},{id:"B4",g:"B",h:"Canadá",a:"Suiza"}],
  "20 Jun":[{id:"C3",g:"C",h:"Marruecos",a:"Haití"},{id:"C4",g:"C",h:"Brasil",a:"Escocia"},{id:"E3",g:"E",h:"Alemania",a:"Costa de Marfil"},{id:"E4",g:"E",h:"Ecuador",a:"Curazao"}],
  "21 Jun":[{id:"F3",g:"F",h:"Países Bajos",a:"Suecia"},{id:"F4",g:"F",h:"Japón",a:"Túnez"},{id:"G3",g:"G",h:"Bélgica",a:"Irán"},{id:"G4",g:"G",h:"Nueva Zelanda",a:"Egipto"}],
  "22 Jun":[{id:"H3",g:"H",h:"Uruguay",a:"Cabo Verde"},{id:"H4",g:"H",h:"España",a:"Arabia Saudita"},{id:"J3",g:"J",h:"Argentina",a:"Austria"},{id:"J4",g:"J",h:"Jordania",a:"Argelia"}],
  "23 Jun":[{id:"I3",g:"I",h:"Francia",a:"Noruega"},{id:"I4",g:"I",h:"Irak",a:"Senegal"},{id:"K3",g:"K",h:"Portugal",a:"Uzbekistán"},{id:"K4",g:"K",h:"RD del Congo",a:"Colombia"},{id:"L3",g:"L",h:"Inglaterra",a:"Ghana"},{id:"L4",g:"L",h:"Panamá",a:"Croacia"}],
  "24 Jun":[{id:"A5",g:"A",h:"Rep. Checa",a:"México"},{id:"A6",g:"A",h:"Sudáfrica",a:"Corea del Sur"}],
  "25 Jun":[{id:"D5",g:"D",h:"Turquía",a:"EE.UU."},{id:"D6",g:"D",h:"Paraguay",a:"Australia"},{id:"E5",g:"E",h:"Ecuador",a:"Alemania"},{id:"E6",g:"E",h:"Curazao",a:"Costa de Marfil"},{id:"F5",g:"F",h:"Túnez",a:"Países Bajos"},{id:"F6",g:"F",h:"Suecia",a:"Japón"}],
  "26 Jun":[{id:"B5",g:"B",h:"Suiza",a:"Canadá"},{id:"B6",g:"B",h:"Bosnia y Herz.",a:"Catar"},{id:"G5",g:"G",h:"Egipto",a:"Irán"},{id:"G6",g:"G",h:"Nueva Zelanda",a:"Bélgica"},{id:"H5",g:"H",h:"Cabo Verde",a:"Arabia Saudita"},{id:"H6",g:"H",h:"Uruguay",a:"España"}],
  "27 Jun":[{id:"I5",g:"I",h:"Irak",a:"Francia"},{id:"I6",g:"I",h:"Senegal",a:"Noruega"},{id:"J5",g:"J",h:"Argelia",a:"Austria"},{id:"J6",g:"J",h:"Jordania",a:"Argentina"},{id:"K5",g:"K",h:"Colombia",a:"Portugal"},{id:"K6",g:"K",h:"RD del Congo",a:"Uzbekistán"},{id:"L5",g:"L",h:"Panamá",a:"Inglaterra"},{id:"L6",g:"L",h:"Croacia",a:"Ghana"}],
};
const DATES = Object.keys(MATCHES_BY_DATE);
const ALL_MATCHES = Object.values(MATCHES_BY_DATE).flat();
const GC = {A:"#e74c3c",B:"#e67e22",C:"#f1c40f",D:"#2ecc71",E:"#1abc9c",F:"#3498db",G:"#9b59b6",H:"#e91e63",I:"#00bcd4",J:"#8bc34a",K:"#ff9800",L:"#607d8b"};
const FL = {"México":"🇲🇽","Sudáfrica":"🇿🇦","Corea del Sur":"🇰🇷","Rep. Checa":"🇨🇿","Canadá":"🇨🇦","Bosnia y Herz.":"🇧🇦","Catar":"🇶🇦","Suiza":"🇨🇭","Brasil":"🇧🇷","Marruecos":"🇲🇦","Haití":"🇭🇹","Escocia":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","EE.UU.":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Turquía":"🇹🇷","Alemania":"🇩🇪","Curazao":"🇨🇼","Costa de Marfil":"🇨🇮","Ecuador":"🇪🇨","Países Bajos":"🇳🇱","Japón":"🇯🇵","Suecia":"🇸🇪","Túnez":"🇹🇳","Bélgica":"🇧🇪","Egipto":"🇪🇬","Irán":"🇮🇷","Nueva Zelanda":"🇳🇿","España":"🇪🇸","Cabo Verde":"🇨🇻","Arabia Saudita":"🇸🇦","Uruguay":"🇺🇾","Francia":"🇫🇷","Senegal":"🇸🇳","Noruega":"🇳🇴","Irak":"🇮🇶","Argentina":"🇦🇷","Argelia":"🇩🇿","Austria":"🇦🇹","Jordania":"🇯🇴","Portugal":"🇵🇹","Uzbekistán":"🇺🇿","Colombia":"🇨🇴","RD del Congo":"🇨🇩","Inglaterra":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croacia":"🇭🇷","Ghana":"🇬🇭","Panamá":"🇵🇦"};

// ─── STORAGE ───
const sto = {
  get(k) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch{return null;} },
  set(k,v) { try { localStorage.setItem(k,JSON.stringify(v)); } catch{} }
};

// ─── STATE ───
let players = sto.get("q_players") || [];
let results = sto.get("q_results") || {};
let currentPlayer = null;
let predictions = {};
let currentView = "home";
let selectedDate = DATES[0];

// ─── SCORING ───
function calcPts(pred, actual) {
  if (!actual || actual.h==="" || actual.a==="") return null;
  const pH=parseInt(pred.h), pA=parseInt(pred.a), aH=parseInt(actual.h), aA=parseInt(actual.a);
  if (isNaN(pH)||isNaN(pA)||isNaN(aH)||isNaN(aA)) return null;
  if (pH===aH && pA===aA) return 5;
  let pts=0;
  if (Math.sign(pH-pA)===Math.sign(aH-aA)) pts+=3;
  if (pH===aH || pA===aA) pts+=1;
  return pts;
}

// ─── TOAST ───
function showToast(msg) {
  const c = document.getElementById("toast-container");
  c.innerHTML = `<div class="toast">${msg}</div>`;
  setTimeout(() => c.innerHTML = "", 2600);
}

// ─── NAV ───
function renderNav() {
  const nav = document.getElementById("nav");
  nav.innerHTML = [["home","Inicio"],["play","Jugar"],["results","Resultados"],["standings","Tabla"],["rules","Reglas"]]
    .map(([v,l]) => `<button class="${currentView===v?'active':''}" onclick="switchView('${v}')">${l}</button>`).join("");
}

function switchView(v) {
  currentView = v;
  ["home","play","results","standings","rules"].forEach(id => {
    document.getElementById("view-"+id).classList.toggle("hidden", id!==v);
  });
  renderNav();
  if (v==="home") renderHome();
  else if (v==="play") renderPlay();
  else if (v==="results") renderResults();
  else if (v==="standings") renderStandings();
  else if (v==="rules") renderRules();
}

// ─── DATE SELECTOR ───
function dateSelector(onChange) {
  return `<div class="date-scroll">${DATES.map(d =>
    `<button class="date-btn ${selectedDate===d?'active':''}" onclick="${onChange}('${d}')">${d}</button>`
  ).join("")}</div>`;
}

// ─── MATCH CARD ───
function matchCard(m, predOrRes, inputHandler, isResult) {
  const p = predOrRes || {h:"",a:""};
  const actual = results[m.id];
  const pts = !isResult ? calcPts(p, actual) : null;
  let ptsHtml = "";
  if (pts !== null) {
    const bg = pts===5?"#27ae60":pts>=3?"#2980b9":pts>0?"#f39c12":"#95a5a6";
    const txt = pts===5?`✓ Exacto +${pts}`:pts>=3?`✓ Resultado +${pts}`:pts>0?`~ Goles +${pts}`:`✗ 0 pts`;
    ptsHtml = `<div class="pts-label" style="background:${bg}">${txt}</div>`;
  }
  return `<div class="match-card">
    <div class="group-tag" style="background:${GC[m.g]}">Grupo ${m.g}</div>
    <div class="match-row">
      <div class="team-side"><span class="flag">${FL[m.h]||"🏳️"}</span><span class="team-name">${m.h}</span></div>
      <input class="score-input ${isResult?'result':''}" value="${p.h}" oninput="${inputHandler}('${m.id}','h',this.value)" inputmode="numeric" placeholder="-">
      <span class="vs">VS</span>
      <input class="score-input ${isResult?'result':''}" value="${p.a}" oninput="${inputHandler}('${m.id}','a',this.value)" inputmode="numeric" placeholder="-">
      <div class="team-side right"><span class="team-name">${m.a}</span><span class="flag">${FL[m.a]||"🏳️"}</span></div>
    </div>
    ${ptsHtml}
  </div>`;
}

// ─── HOME ───
function renderHome() {
  const el = document.getElementById("view-home");
  el.innerHTML = `
    <h2 class="section-title">Jugadores</h2>
    <div class="add-row">
      <input id="new-player" placeholder="Nombre del jugador" onkeydown="if(event.key==='Enter')addPlayer()">
      <button class="add-btn" onclick="addPlayer()">+ Agregar</button>
    </div>
    ${players.length===0?'<p class="empty">Agrega jugadores para comenzar la quiniela</p>':""}
    <div>${players.map(p => `<div class="player-card">
      <div class="player-avatar">${p.charAt(0).toUpperCase()}</div>
      <span class="player-name" onclick="selectPlayer('${p}')">${p}</span>
      <button class="play-btn" onclick="selectPlayer('${p}')">▶ Jugar</button>
      <button class="remove-btn" onclick="removePlayer('${p}')">✕</button>
    </div>`).join("")}</div>`;
}
window.addPlayer = function() {
  const inp = document.getElementById("new-player");
  const name = inp.value.trim();
  if (!name || players.includes(name)) return;
  players.push(name);
  sto.set("q_players", players);
  inp.value = "";
  showToast(`${name} se unió a la quiniela`);
  renderHome();
};
window.removePlayer = function(name) {
  if (!confirm(`¿Eliminar a ${name}?`)) return;
  players = players.filter(p => p !== name);
  sto.set("q_players", players);
  try { localStorage.removeItem("q_preds_"+name); } catch{}
  if (currentPlayer===name) { currentPlayer=null; predictions={}; }
  showToast(`${name} eliminado`);
  renderHome();
};
window.selectPlayer = function(name) {
  currentPlayer = name;
  predictions = sto.get("q_preds_"+name) || {};
  selectedDate = DATES[0];
  switchView("play");
};

// ─── PLAY ───
function renderPlay() {
  const el = document.getElementById("view-play");
  if (!currentPlayer) {
    el.innerHTML = `<h2 class="section-title">Elige tu jugador</h2>
      ${players.length===0?'<p class="empty">Primero agrega jugadores en Inicio</p>':""}
      <div>${players.map(p => `<div class="player-card" onclick="selectPlayer('${p}')" style="cursor:pointer">
        <div class="player-avatar">${p.charAt(0).toUpperCase()}</div>
        <span class="player-name">${p}</span>
      </div>`).join("")}</div>`;
    return;
  }
  const matches = MATCHES_BY_DATE[selectedDate] || [];
  el.innerHTML = `
    <div class="player-banner">
      <span class="banner-name">Pronósticos de ${currentPlayer}</span>
      <button class="change-btn" onclick="currentPlayer=null;predictions={};renderPlay();">Cambiar</button>
    </div>
    ${dateSelector("changePlayDate")}
    <div>${matches.map(m => matchCard(m, predictions[m.id], "setPred", false)).join("")}</div>
    <button class="save-btn" onclick="savePreds()">💾 Guardar pronósticos</button>`;
}
window.changePlayDate = function(d) { selectedDate=d; renderPlay(); };
window.setPred = function(id,side,val) {
  val = val.replace(/[^0-9]/g,"").slice(0,2);
  if (!predictions[id]) predictions[id]={h:"",a:""};
  predictions[id][side]=val;
  // Update just the input value without re-rendering
};
window.savePreds = function() {
  sto.set("q_preds_"+currentPlayer, predictions);
  showToast("Pronósticos guardados ✓");
};

// ─── RESULTS ───
function renderResults() {
  const el = document.getElementById("view-results");
  const matches = MATCHES_BY_DATE[selectedDate] || [];
  el.innerHTML = `
    <h2 class="section-title">Resultados Oficiales</h2>
    <p class="admin-note">Ingresa los marcadores reales de cada partido</p>
    ${dateSelector("changeResDate")}
    <div>${matches.map(m => matchCard(m, results[m.id], "setRes", true)).join("")}</div>
    <button class="save-btn" onclick="saveRes()">💾 Guardar resultados</button>`;
}
window.changeResDate = function(d) { selectedDate=d; renderResults(); };
window.setRes = function(id,side,val) {
  val = val.replace(/[^0-9]/g,"").slice(0,2);
  if (!results[id]) results[id]={h:"",a:""};
  results[id][side]=val;
};
window.saveRes = function() {
  sto.set("q_results", results);
  showToast("Resultados guardados ✓");
};

// ─── STANDINGS ───
function renderStandings() {
  const el = document.getElementById("view-standings");
  const rows = players.map(p => {
    const preds = sto.get("q_preds_"+p) || {};
    let total=0, exact=0, resOk=0, goalsOk=0;
    ALL_MATCHES.forEach(m => {
      const pred=preds[m.id], actual=results[m.id];
      if (!pred||!actual) return;
      const pts=calcPts(pred,actual);
      if (pts===null) return;
      total+=pts;
      if (pts===5) exact++; else if (pts>=3) resOk++; else if (pts>0) goalsOk++;
    });
    return {name:p, total, exact, resOk, goalsOk};
  }).sort((a,b) => b.total-a.total || b.exact-a.exact);

  el.innerHTML = `
    <h2 class="section-title">Tabla de Posiciones</h2>
    ${rows.length===0?'<p class="empty">Agrega jugadores y resultados para ver la tabla</p>':""}
    <div>
      <div class="standings-header">
        <span class="s-col narrow">#</span>
        <span class="s-col wide">Jugador</span>
        <span class="s-col">Pts</span>
        <span class="s-col">Ex</span>
        <span class="s-col">Res</span>
        <span class="s-col">Gol</span>
      </div>
      ${rows.map((r,i) => `<div class="standings-row ${i===0?'first':''}">
        <span class="s-col narrow" style="font-weight:800">${i===0?"🏆":i===1?"🥈":i===2?"🥉":i+1}</span>
        <span class="s-col wide" style="font-weight:600">${r.name}</span>
        <span class="s-col pts">${r.total}</span>
        <span class="s-col">${r.exact}</span>
        <span class="s-col">${r.resOk}</span>
        <span class="s-col">${r.goalsOk}</span>
      </div>`).join("")}
    </div>
    <div class="legend">
      <span><b>Pts</b> = Total</span>
      <span><b>Ex</b> = Exactos</span>
      <span><b>Res</b> = Resultado</span>
      <span><b>Gol</b> = Goles</span>
    </div>`;
}

// ─── RULES ───
function renderRules() {
  document.getElementById("view-rules").innerHTML = `
    <h2 class="section-title">Reglas de Puntaje</h2>
    <div class="rule-card">
      <div class="rule-row"><div class="rule-badge" style="background:#27ae60">+5</div><div><p class="rule-title">Marcador Exacto</p><p class="rule-desc">Aciertas el resultado exacto. Ej: pronosticas 2-1 y termina 2-1</p></div></div>
      <div class="rule-row"><div class="rule-badge" style="background:#2980b9">+3</div><div><p class="rule-title">Resultado Correcto</p><p class="rule-desc">Aciertas quién gana o empate, pero no el marcador. Ej: pronosticas 2-0 y termina 3-1</p></div></div>
      <div class="rule-row"><div class="rule-badge" style="background:#f39c12">+1</div><div><p class="rule-title">Goles de un equipo</p><p class="rule-desc">Aciertas goles de al menos un equipo pero no el resultado. Ej: pronosticas 2-1 y termina 2-2</p></div></div>
      <div class="rule-row"><div class="rule-badge" style="background:#95a5a6">0</div><div><p class="rule-title">Sin acierto</p><p class="rule-desc">No aciertas ni resultado ni goles</p></div></div>
    </div>
    <div class="rule-note">
      <p>📌 Se cuenta el resultado en tiempo reglamentario (90 min). Prórrogas y penales no afectan.</p>
      <p>📌 Desempate: más marcadores exactos, luego más resultados correctos.</p>
    </div>`;
}

// ─── INIT ───
renderNav();
renderHome();
</script>
